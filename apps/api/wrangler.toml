name = "vestoxr-api"
main = "src/index.ts"
compatibility_date = "2026-07-01"

# APP_VERSION drives the visible version indicator in the web UI's response
# headers / health endpoint. Generated from the root package.json's "version"
# field — do not edit by hand; bump it there and run `npm run version:sync`.
[vars]
APP_VERSION = "0.5.1"
ALLOWED_ORIGINS = "https://vestoxr-web.pages.dev,https://platform.luxrcore.com"

[[d1_databases]]
binding = "DB"
database_name = "vestoxr-db"
database_id = "ed63c3e6-b4b3-4e6c-ad56-8f1e8580c1a6"
migrations_dir = "migrations"

[[r2_buckets]]
binding = "BUCKET"
bucket_name = "vestoxr-assets"

# JWT_SECRET must be set via `wrangler secret put JWT_SECRET` — never committed here.
